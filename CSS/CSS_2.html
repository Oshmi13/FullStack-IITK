    <style type="text/css">
        p
        {
            color: navy;
            /* can line height */

            /* The text will stretch so that it aligns evenly along both the left and right edges of its container. */
            text-align: justify;

            letter-spacing: 10px;
            word-spacing: 20px;

            /* text-transform: uppercase;  */
            text-transform: capitalize; 
             
            /* text-decoration: underline wavy, line-through; */

            /* font-weight:  */
        
        }

            text-align: center;
            background-color: navy;
            color: lightblue;
            height: 100px;

            /* This includes the space above and below the text within the line, effectively increasing or decreasing the spacing between lines. */
            line-height: 100px;

            /* border-radius: 10px 20px 0px 50px; */

        }

            border-bottom-style: solid;
        }
