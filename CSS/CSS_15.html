    <style type="text/css">
        #myvid
        {
            /* object-fit: contain; */
            object-fit: cover;
            width: 100vw;
            height: 100vh;
            position: fixed;
            
            /* z-index for video to be set as background */
            z-index: -1;
            top: 0px;
            left: 0px;
        }

        h1
        {
            text-align: center;
            line-height: 100px;
            height: 100px;
            /* background-color: rosybrown; */
            
            /* opacity- 0.1 to 1 */
            opacity: 0.1;
            

        }

        p
        {
            padding: 20px;

            /* rgba - alpha : used when the background to text or heading is blur but the text is not */
            background-color: rgba(255,255,255,0.2);
            font-size: 30px;
        }




        


    </style>
<body>

    <!-- we are trying to set video as background -->

    <video id = "myvid" autoplay muted loop>

    </video>
