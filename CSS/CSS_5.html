<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style type="text/css">

        /* Descendant selectors */
        /* Targets an specific element inside another, such as paragraphs inside div  */
        div p
        {
            color:blueviolet;
        }

        /* Styles an element immediately following another */
        /* h1 element after div element will be affected */

        div + h1
        {
            background-color: aqua;
            color: navy;
            padding: 20px;
            text-align: centre;
        }

        h1 + p
        {
            font-weight: bold;
        }

        /* Child selector  */
        /* They only affects the direct child elements of a parent.  */
        /* will change all h2 inside div>div */

        div>div>h2
        {
            color: rgb(218, 221, 47);
        } 

        /* General sibling selector */
        /* Styles all siblings that follow a specific element */
        /* all h1 elemnts ocurring after div element */
        div ~ h1
        {
            color:brown;
        }
            
        
        

    </style>
</head>
<body>
    
    <h1>Heading 1</h1>
    <p> I am a Full Stack Developer </p>
    <h1>Heading 2</h1>
    
    <div>
        <h1>Heading 3</h1>
        <span>
            <h1>Heading 4</h1>
        </span>

        <div>
            <h2>Heading 0</h2>
            <h1>Heading 5</h2>
            <h2>Heading 3</h2>
        </div>
        <h1>Heading 6</h1>
        <p>
            paragraph 1
        </p>

    </div>

    <h1>Heading 7</h1>
    <h1>Heading 8</h1>
    
</body>
</html>
