<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">

        .navigation > img
        {
            width: 100px;
            height: 50px;
            border-radius: 10px;
            margin-left: 20px;
        }

        .navigation
        {
            display: flex;
            flex-flow: row wrap;
            justify-content: flex start;
            background-color: navy;
            align-items: center;
        }

        .navigation ul
        {
            display: flex;
            list-style-type: none;
            flex-flow: row wrap;
            margin: 0;
        }

        .navigation a
        {
            text-decoration: none;
            display: block;
            padding: 20px;
            color: aliceblue;
        }

        .navigation a:hover 
        {
            background-color: skyblue;
            color: navy;
        }

        @media screen and (min-width: 768px) and (max-width: 991px)
        {
            .navigation
            {
                justify-content: center;
            }
        }
        @media screen and (max-width: 768px) 
        {
            .navigation img
            {
                display: none;
            }
            .navigation ul 
            {
                flex-flow: column wrap;
                padding: 0px;
            }
            .navigation a
            {
                text-align: center;
                width: 100%;
                border-bottom: 1px solid white;

            }
        }
    </style>

</head>
<body>
    <!-- navigation bar are list of hyperlinks -->
    <nav class="navigation">
        <img src="./images/ROSE_jpg" />
        <ul>
            <li><a href="#">Home</a> </li>
            <li><a href="#">About us</a> </li>
            <li><a href="#">Our team</a> </li>
            <li><a href="#">Contact us</a> </li>
            <li><a href="#">Our services</a> </li>
            
        </ul>
    </nav>
</body>
</html>
