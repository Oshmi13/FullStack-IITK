<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">

        .container
        {   
            display: flex;
            flex-direction: row;
            text-align: center;
            gap: 6px;

            /* flex-wrap */
            flex-wrap: wrap;

        }

        .container > *
        {
            border: 1px solid;
            padding: 20px;
            border-radius: 5px;

            /* inspect */
            /* flex: 1 1 500%; */

            /*  default */
            flex: 1 1 100%;
        }

        .header
        {
            background-color: rgb(243, 243, 54);
            color: blueviolet;
            height: 100px;
            line-height: 100px;
            font-size: 30px;
        }

        .footer
        {
            background-color: rgb(202, 120, 120);
            color: blueviolet;
            height: 100px;
            line-height: 100px;
            font-size: 30px;
        }

        .main
        {
            background-color: rgb(163, 203, 190);
            font-size: 20px;
        }
        .aside1
        {
            background-color: rgb(38, 113, 113);
        }
        .aside2
        {
            background-color: rgb(38, 113, 113);
        }


        /* above 992px the media query will work */
        @media screen and (min-width: 992px)
        {
            .aside1
            {
                order:1;
            }
            .main
            {
                order: 2;
            }
            .aside2
            {
                order: 3;
            }
            .footer
            {
                order: 4;
            }
            .aside1
            {
                flex-grow: 1;
                flex-shrink: 1;
                flex-basis: 0%;
            }
            .aside2
            {
                flex-grow: 1;
                flex-shrink: 1;
                flex-basis: 0%;
            }
            .main
            {
                flex-grow: 3;
                flex-shrink: 3;
                flex-basis: 0%;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 991px)
        {
            .aside1
            {
                flex: 1 3 0%;
            }
            .aside2
            {
                flex: 1 1 0%;
            }
        }


    </style>
</head>
<body>
    
    <div class="container">
        <header class="header">
            Header
        </header>
        
        <article class="main">
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Fugit cum, cupiditate error molestiae blanditiis vel? Id sequi, quibusdam officiis et deleniti facilis praesentium commodi omnis pariatur esse delectus eum ratione?
            </p>
        </article>
        <aside class="aside1">
            Aside 1
        </aside>
        
        <aside class="aside2">
            Aside 2
        </aside>
        <footer class="footer">
            Footer
        </footer>





    </div>
         


    
</body>
</html>
