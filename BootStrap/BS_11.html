<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add lib of bootstrap to run -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <style>
        
        .row > .col:nth-child(odd)
        {
            border: 1px solid;
            background-color: yellow;
        }
        .row > .col:nth-child(even)
        {
            border: 1px solid;
            background-color: aqua;
        }
        .row > div:nth-child(even)
        {
            border: 1px solid;
            background-color: rgb(203, 122, 16);
            text-align: center;
        }
        .row > div:nth-child(odd)
        {
            border: 1px solid;
            background-color: blue;
            text-align: center;
        }
        
    </style>
</head>
<body>
    <!-- mobile first -->
    <!-- CAROSEL -->

    <div class="container mt 4">
       
        <ul class="nav justify-content-center">
            <li class="nav-item" >
                <a class="nav-link" data-bs-toggle="tab" href="#home">Home</a></li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#profile">Our Team</a></li>
            <li class="nav-item">
                <a  class="nav-link" data-bs-toggle="tab" href="#contact">Our Contact</a></li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#Our_Services">Our Services</a></li>
            <li class="nav-item">
                <a  class="nav-link" data-bs-toggle="tab" href="#Reviews">Reviews</a></li>
        </ul>
        <br />
        <div class="tab-content mt-3">
            <div class="tab-pane fade show active" id="home">
                <p>Welcome to the Home tab!</p>
            </div>
            <div class="tab-pane fade" id="profile">
                <p>This is the Profile tab.</p>
            </div>
            <div class="tab-pane fade" id="contact">
                <p>This is the Contact tab.</p>
            </div>
            <div class="tab-pane fade" id="Our_Services">
                <p>This is the Our Services tab.</p>
            </div>
            <div class="tab-pane fade" id="Reviews">
                <p>This is the Reviews tab.</p>
            </div>
        </div>
    </div>
</ul>

    <!-- in this division tag the content of tabs is present -->
    <div class="container mt-4">
        <!-- Nav tabs -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item active" role="presentation">
                <button class="nav-link " id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button" role="tab" aria-controls="home" aria-selected="false">Home</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab" aria-controls="profile" aria-selected="false">Profile</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="contact-tab" data-bs-toggle="tab" data-bs-target="#contact" type="button" role="tab" aria-controls="contact" aria-selected="false">Contact</button>
            </li>
        </ul>
    
        <!-- Tab content -->
        <div class="tab-content mt-3" id="myTabContent">
            <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
                <p>This is the Home tab content.</p>
            </div>
            <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                <p>This is the Profile tab content.</p>
            </div>
            <div class="tab-pane fade" id="contact" role="tabpanel" aria-labelledby="contact-tab">
                <p>This is the Contact tab content.</p>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    </html>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
