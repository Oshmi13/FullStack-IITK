<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add lib of bootstrap to run -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <style>
        
        
        
    </style>
</head>
<body>
   

    <div class="container">
       <button class="btn btn-info" data-toggle="modal" data-target="#myModal">Click</button>

       <div class="modal" id="myModal"  data-backdrop="static">
            <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <!-- div*3 -->
                    <div class="modal-header">
                        <h3 class="modal-title">Modal Heading</h3>
                    </div>
                    <div class="modal-body">
                        <p class="alert alert-info">
                            Lorem ipsum, dolor sit amet consectetur adipisicing elit. Impedit, inventore numquam. Labore, rerum ullam. Pariatur, nam. Quas corrupti sapiente non officia sequi eius dolor saepe voluptates, cumque dolorum impedit minima!
                        </p>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-danger" data-dismiss="modal">Close</button>
                        

                    </div>
                </div>
            </div>
       </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
