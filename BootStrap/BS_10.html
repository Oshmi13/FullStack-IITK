<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add lib of bootstrap to run -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <style>
        
        .row > .col:nth-child(odd)
        {
            border: 1px solid;
            background-color: yellow;
        }
        .row > .col:nth-child(even)
        {
            border: 1px solid;
            background-color: aqua;
        }
        
    </style>
</head>
<body>
    <!-- mobile first -->
    <!-- "Mobile-first" is a design and development approach where a website or web app is designed for mobile devices first, and then enhanced for larger screens (tablets, laptops, desktops). -->
    <!-- Instead of designing for desktops and then trying to "scale down" for smaller screens, mobile-first ensures that the core functionality and layout work optimally on mobile devices before adapting to larger screens. -->
    <!-- CAROSEL -->

    

        <div class="row">
        <!-- 
            1 col == 2 col in xl @ 1200 total = 8 col
            1 col == 3 col in lg @1199 total=12 col
            1 col == 4 col in md @ total=  col   -->

            <div class="col-sm-6 col-md-4 col-lg-3 col-xl-2">Div 1</div>
            <div class="col-sm-6 col-md-4 col-lg-3 col-xl-2">Div 2</div>
            <div class="col-sm-6 col-md-4 col-lg-3 col-xl-2">Div 3</div>
            <div class="col-sm-6 col-md-4 col-lg-3 col-xl-2">Div 4</div>

            <!-- will not be visible till 767 and above that it is visible -->
            <div class="d-none d-md-block d-xl-none">Div 5</div>
        </div>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
