<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar with Dropdowns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-info">
    <div class="container-fluid">
        
        <!-- Brand Logo -->
        <a href="#" class="navbar-brand">
            <img src="./shinchan_1.jpeg" style="width: 120px" />
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <!-- Home Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="homeDropdown" data-bs-toggle="dropdown">Home</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Sub-item 1</a></li>
                        <li><a class="dropdown-item" href="#">Sub-item 2</a></li>
                    </ul>
                </li>

                <!-- Our Team Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="teamDropdown" data-bs-toggle="dropdown">Our Team</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Team Member 1</a></li>
                        <li><a class="dropdown-item" href="#">Team Member 2</a></li>
                    </ul>
                </li>

                <!-- Our Services Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="servicesDropdown" data-bs-toggle="dropdown">Our Services</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Web App Dev</a></li>
                        <li><a class="dropdown-item" href="#">Mobile App Dev</a></li>
                        <li><a class="dropdown-item" href="#">Cloud Services</a></li>
                    </ul>
                </li>

                <!-- About Us Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="aboutDropdown" data-bs-toggle="dropdown">About Us</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Company History</a></li>
                        <li><a class="dropdown-item" href="#">Mission & Vision</a></li>
                    </ul>
                </li>

                <!-- Contact Us Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="contactDropdown" data-bs-toggle="dropdown">Contact Us</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Email</a></li>
                        <li><a class="dropdown-item" href="#">Phone</a></li>
                        <li><a class="dropdown-item" href="#">Location</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
