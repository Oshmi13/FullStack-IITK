<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add lib of bootstrap to run -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <style>

        

    </style>
</head>
<body>
    
    <div class="container" >
        <br />

        <button type="button">Button</button>
        <!-- The btn btn-primary class is used to style buttons with the primary theme color (usually blue by default). -->
        <button type="button" class="btn btn-primary">Button</button>
        <br />
        <button type="button" class="btn btn-info">Button</button>
        <br />
        <button type="button" class="btn btn-danger">Button</button>
        <br />

        <!-- button as hyperlink -->
        <!-- classes of btn and btn-link to create a button that looks like a link.  -->
        <!-- Using these classes, we can create link-based buttons that look like actual links rather than a simple button. -->
        <button type="button" class="btn btn-link" onclick="alert('The Button is clicked')">Click Me</button>
        
        <!-- Bootstrap-styled button using a hyperlink  -->
        <!-- The # is a placeholder that means "stay on the current page." -->
        <!-- Looks like a button but functions as a link. -->
        <a href="#" class="btn btn-dark">Hyperlink</a>
        <br />

        <button type="button" class="btn btn-lg btn-warning">Button</button>
        <button type="button" class="btn btn-sm btn-secondary">Button</button>
        <br />

        <button type="button" class="btn btn-outline-primary">Button</button>
        <br />

        <!-- block level button -->
        <button type="button" class="btn btn-block btn-warning">Button</button>
        <br />

        <!-- Button group -->

        <div class=" btn-group">
            <button type="button" class="btn btn-primary"> Button</button>
            <button type="button" class="btn btn-info"> Button</button>
            <button type="button" class="btn btn-danger"> Button</button>
            <button type="button" class="btn btn-dark"> Button</button>

           
        </div>
        <br />
        <br />
        <!-- Bootstrap Dropdown -->
        <div class="dropdown">
            <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                Dropdown Button
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action 1</a></li>
                <li><a class="dropdown-item" href="#">Action 2</a></li>
                <li><a class="dropdown-item" href="#">Action 3</a></li>
            </ul>
        </div>
       
        
        <!-- Bootstrap JavaScript (Required for dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
