<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add lib of bootstrap to run -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <style>
        
        
        /* Selects every odd-numbered child (1st, 3rd, 5th, etc.) inside .row.
        The selector .row > .col:nth-child(odd) is a CSS combinator rule that applies styles to specific child elements within .row. */
        
        .row > .col:nth-child(odd)
        {
            border: 1px solid;
            background-color: yellow;
        }
        .row > .col:nth-child(even)
        {
            border: 1px solid;
            background-color: aqua;
        }
        .row > div:nth-child(even)
        {
            border: 1px solid;
            background-color: rgb(203, 122, 16);
            text-align: center;
        }
        .row > div:nth-child(odd)
        {
            border: 1px solid;
            background-color: blue;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- mobile first -->
    <!-- CAROSEL -->

    <div class="container">
          <div class="row">
            <div class="col">Div 1</div>
            <div class="col">Div 2</div>
            <div class="col">Div 3</div>
            <div class="col">Div 4</div>
            <div class="col">Div 5</div>
            <div class="col">Div 6</div>
            <div class="col">Div 7</div>
            <div class="col">Div 8</div>
            <div class="col">Div 9</div>
            <div class="col">Div 10</div>
            <div class="col">Div 11</div> 

        </div> 
        <!-- if we have to make equal width col then use class="col" -->
        <!-- col → Stands for column,
             lg → Applies this rule when the screen width is ≥992px (large screens),
             3 → Specifies that this column should take 3 out of 12 available columns (since Bootstrap uses a 12-column grid system). -->
        
        <div class="row">
            <div class="col">Div 1</div>
            <div class="col">Div 1</div>
            <div class="col">Div 1</div>
        </div>

        <!-- you should define on large or extra large so that it can be cahanged to s xs md -->
        <!-- large devices: 992px-1199px -->
        <div class="row">
            <!-- col-lg-3 is a column class that defines how much width a particular column should take up in a grid system when the screen size is large (lg) or bigger. -->
            <div class="col-lg-3">Div 1</div>
            <div class="col-lg-6">Div 2</div>
            <div class="col-lg-3">Div 3</div>
        </div>
        <br />
        <!-- if you define xl thwn thw window can be minimized more -->
        <div class="row">
            <!-- col-lg-3 is a column class that defines how much width a particular column should take up in a grid system when the screen size is large (lg) or bigger. -->
            <div class="col-xl-3">Div 1</div>
            <div class="col-xl-6">Div 2</div>
            <div class="col-xl-3">Div 3</div>
        </div>
        <br />

        <div class="row">
            <div class="col-md-4">Div 1</div>
            <div class="col-md-4">Div 2</div>
            <div class="col-md-4">Div 3</div>
        </div>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
