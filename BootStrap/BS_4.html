<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add lib of bootstrap to run -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    
</head>
<body>
    
    <div class="container" >
        <br />

        <div class="spinner-border text-danger"></div>
        <!-- spinner-border-sm → Makes the spinner smaller -->
         <br />
        <div class="spinner-border spinner-border-sm text-info"></div>
        <br />
        <div class="spinner-grow  text-primary"></div>
        <br />
        <div class="spinner-grow spinner-grow-sm text-primary"></div>
        <br />

        <button class="btn btn-primary">
                Loading....
            <div class="spinner-border spinner-border-sm text-danger"></div>
        </button>
        <br />
            
            <!-- <img class="rounded-circle" src="./images/ROSE.jpg" style="width:300px; height: 300px" >
                 <img class="rounded" src="./images/ROSE.jpg" style="width:300px;height: 300px" >
                 <img class="img-thumbnail" src="./images/ROSE.jpg" style="width: 300px; height: 300px" >

           
                <img class="img-thumbnail float-right" src="./images/ROSE.jpg" style="width:300px; height: 300px" > -->
            <!-- For element to center align convert it to block level element and set margin to auto -->
            <img class="img-thumbnail d-block mx-auto" src="./shinchan_1.jpeg" style="width:300px;height: 300px" >

            <!-- <img class="img-thumbnail img-fluid" src="./shinchan_2.jpeg" style="width:300px;height: 300px" > -->

            <br />

            <div class="progress" style="height : 30px;">
                <div class="progress-bar" style="width: 90%">
                    90% Completed
                </div>
            </div>
            <br />
            <div class="progress" style="height : 20px;">
                <!-- style="width: 70%;" → Defines how much of the bar is filled (70%). -->
                <div class="progress-bar progress-bar-striped" style="width: 30%">
                    30% Completed
                </div>
            </div>
            <br />

            <div class="progress" style="height : 20px;">
                <div class="progress-bar progress-bar-animated" style="width: 50%">
                    50% Completed
                </div>
            </div>







    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
